body:
  text: 失譯人名今附梁録如是我聞一時佛在舍衛國祇陀林中爾時有一外道旃陀羅女專行衆惡符書厭禱或事山神樹神樹下鬼神日月五星南斗北辰一切魍魎雜魔邪魅惑尊者阿難及諸善人如是等恆河沙數即時如來因見阿難恍惚憐愍一切故為說此六字神呪王經先佛所說我今亦說即說呪曰安陀隸槃陀隸迦羅知趐由知帝闍波帝頻頭波帝陀頭隸陀究帝隸陀究摩帝修摩帝安陀羅槃陀羅檀陀羅提兜羅阿那延陀曼陀波帝阿那阿那夜摩頭摩波帝迦羅吒翅由羅浮登伽彌帝闍波帝頻頭摩帝阿羅婆伽婆帝毗咤毗提膩至吒毗提膩悉波呵若有為某甲作惡呪詛若作已若當作若天若龍若夜叉若羅剎若餓鬼若鳩𭾻茶若富多那若毗舍闍若阿波摩羅若憂波摩羅若吉遮若佉傴陀若毗陀羅若半毗陀羅若沙門若婆羅門若剎利若毗舍若首陀若摩登伽女若栴陀羅若栴陀羅女若奴若婢若男若女若外道若尼乾若外道出家男女如是等種種悉能呪詛蠱我今以此六字神呪王經若天上作天上滅之若天下作天下滅之若雲漢中作雲漢中滅之若虛空中作虛空中滅之若地上作地上滅之若地下作地下滅之若八表外作八表外滅之若六合內作六合內滅之若隨風飄中作隨風飄中滅之若四海大水邊作四海大水邊滅之若江河邊作江河邊滅之若淮濟邊作淮濟邊滅之若陂溏邊作陂溏邊滅之若雜水邊作雜水邊滅之若大山邊作大山邊滅之若五嶽邊作五嶽邊滅之若五嶽中作五嶽中滅之若坑谷邊作坑谷邊滅之若坑谷中作坑谷中滅之若茂林邊作茂林邊滅之若茂林中作茂林中滅之若樹木邊作樹木邊滅之若樹下根中作樹下根中滅之若大道徑邊作大道徑邊滅之若大道徑中作大道徑中滅之若小四交道邊作小四交道邊滅之若城外門作城外門滅之若城內作城內滅之若宮外門作宮外門滅之若宮內作宮內滅之若婆羅門作悉皆滅之若冢墓邊作冢墓邊滅之若冢墓中作冢墓中滅之若垣牆邊作垣牆邊滅之若家舍宅中作家舍宅中滅之若屋宕作屋宕滅之若柱邊作柱邊滅之若柱趺下作柱趺下滅之若坌土邊作坌土邊滅之若坌土中作坌土中滅之若井邊作井邊滅之若井中作井中滅之若碓磨邊作碓磨邊滅之若爐竈邊作爐竈邊滅之若爐竈中作爐竈中滅之若火邊作火邊滅之若火中作火中滅之若廁溷邊作廁溷邊滅之若廁溷便中作廁溷便中滅之若車乘具邊作車乘具邊滅之若車乘具中作車乘具中滅之若鞍馬服飾邊作鞍馬服飾邊滅之若床敷邊作床敷邊滅之若床敷中作床敷寂滅之若衣被氈褥邊作衣被氈褥邊滅之若靴帽中作靴帽中滅之若雜器中作雜器中滅之若飲食中作飲食中滅之若側近人作者悉皆滅之若夜作夜滅之若晝作晝滅之晝夜常作悉皆滅之此呪能斷帝釋呪道能斷梵天呪道能斷四天大王呪道及與一切所有邪鬼呪方道術悉皆能斷若有為某甲作惡呪詛及與毒藥悉皆滅之若佉傴陀若毗陀羅若吉遮若富多那所為悉皆滅之衆惡都盡衆善補處願此呪常吉以此真實章句使某甲晝安夜安晝夜常安得受百歲得見百秋何以故世間最上無過於佛天尊所上衆神仰奉若有行惡呪道若作已作若當作若中作若成就若未成就悉皆滅之及與一切衆毒能害人者此六字神呪王經皆消滅之即說呪曰佉智佉住佉毗智緘壽緘壽多智婆智若有為某甲作惡呪詛若作已若當作若天若龍若夜叉若羅剎及與一切能作惡呪詛悉皆滅之若佉傴陀若毗陀羅若富多那所為悉皆滅之衆惡都盡衆善補處願此呪常吉以此真實章句使某甲晝安夜安晝夜常安得受百歲得見百秋何以故世間最妙無過於法天人所欽衆魔奉受離欲無著即說呪曰佉智佉住佉毗智緘壽緘壽多智婆智何以故世間最貴無過於僧良善福田賢聖所敬衆善守護即說呪曰佉智佉住佉毗智緘壽緘壽多智婆智兜帝阿彌帝阿周帝若有為某甲作惡呪詛若和合毒藥若真若僞所作非法若前身若今身行業衆惡一切重罪皆悉滅之即說呪曰摩烋波烏摩陀蓰陀禰佉傴他波提蓰陀禰頻頭摩提至帝至多提婆蓰陀禰阿渒旃陀渒悉波訶若有人誦持六字神呪王經假令呪枯樹可得還生枝葉何況呪人身使某甲得受百歲得見百秋諸佛所說阿難所傳若人讀誦通利悉皆自護衆惡遠身恆與善居若呪他者能除彼人衆苦惡患誦者斷五辛至心鮮潔然後乃能行之諸難凶禍無有遺餘吉無不利即說呪曰呵呵遮利呵呵那彌呵呵浮丘陀摩提呵呵浮丘陀尼劬沙呵呵尼呵陀佉傴陀尼毗沙佉傴陀伊禰彌禰陀弊陀陀弊悉波呵南無佛觀世音菩薩摩訶薩南無法南無比丘僧禮彼大士然後說是神呪願此呪常吉觀世音觀照我身觀世音觀照我身憐愍我故即說呪曰烏呵尼無呵尼阿陀尼阿陀毗阿陀闍毗尼耽毗尼安陀隸那陀隸斯鼻提安陀羅婆斯薩陸豆率吒婆羅豆率吒貿耽闍波夜耽波夜無呵夜尼波羅夜耶波某羅提槃某遮提盧婁至吒般陀斯至吒般陀斯悉波呵此呪能護一切厄難鮮淨光明解脫無垢觀照一切濟度衆難迷荒惡魔現世護身師子狂象虎狼猿猴及諸毒獸欲害人者皆悉被縛我今為某甲及共行伴一切呪力所向之處願無不吉即說呪曰知𨢘利知利收利摩登耆旃陀利羅叉羅叉羅耶悉波呵南無佛陀南無達摩南無僧伽必願此呪令大吉善用此呪法當用之日洗浴鮮潔淨除垢穢不得行淫不食五辛飲酒噉肉以白疊綖手提其綖誦呪七遍一遍一結若有官事被言若有鬪諍若有呪詛及一切衆惡悉皆滅之呪訖此綖繫著其人淨衣帶中事過之後請佛及僧燒衆名香即就靜坐讀大乘經設供齊會任力有無報佛慈恩主自解願永絶八難善願從心即說呪曰𨢘豆摩帝耶舍波帝波沙無婆帝烏受波帝鬱多羅尼阿叉夜波帝阿㝹羶帝目視婆羅婆某帝婆羅婆只豆悉波呵南無當來過去現在常住三世無量諸佛文殊師利普賢彌勒首楞嚴三昧請佛觀世音消伏毒害虛空藏寶幢孔雀陀羅尼六字章句堅意菩薩不污菩薩各稱一切得道賢聖歸依如是菩薩摩訶薩衆如前三稱三寶然後說此大神陀羅尼呪即說呪曰迦羅尼摩帝毗怒多尼伽帝婆羅毗耶舍首羅婆隸陀㝹提散陀婆提鬱多羅尼舍陀某佉舍陀娑羅毗舍羶陀迦梨舍婆薩那婆伽帝究舍羅婆娑尼阿㝹散帝毗散帝知帝阿知帝湯那伽帝阿湯那伽帝阿婆娑利舍婆羅禰目隸牟羅牟羅婆陀禰舍尼婆羅陸須梨婆帝殊帝婆羅陸須毗摩隸菴摩隸此呪能除一切冥暗如來所持諸天敬愛善神擁護梵天解悟帝釋奉事護世營護決了大聖仙賢受持和合衆生解脫繫縛四天以下及人民衆斷絶煩惱降伏魔怨化令外道摧惡就善諍嫉論說憍慢之心善無不慈增崇善根超越法師不捨大衆悅人學習守護經典甚深法藏利益三寶愍念一切衆生之類莊嚴衆義有如是利名無盡藏此陀羅尼句非護能護若復有人能讀誦者得三十三無疑畏難用此呪法清晨早起洗手漱口燒香禮拜三遍讀誦所行之處言語談論一切向處無常不勝衆人貴敬見者歡喜怨家降伏有如是利益一心奉持此陀羅尼章句者也
